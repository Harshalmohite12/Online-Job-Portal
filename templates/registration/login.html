{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Don't have an account? <a href="{% url 'register' %}">Sign up here</a>
    </p>
    <div style="margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: center;">
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">Quick Demo Login</p>
        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <a href="{% url 'quick_login' 'seeker' %}" class="btn" style="background: rgba(16, 185, 129, 0.15); color: #34d399 !important; border: 1px solid rgba(16, 185, 129, 0.3); width: 100%; box-sizing: border-box;">
                Log In as Demo Job Seeker
            </a>
            <a href="{% url 'quick_login' 'recruiter' %}" class="btn" style="background: rgba(129, 140, 248, 0.15); color: #a5b4fc !important; border: 1px solid rgba(129, 140, 248, 0.3); width: 100%; box-sizing: border-box;">
                Log In as Demo Recruiter
            </a>
        </div>
    </div>
</div>
{% endblock %}
